name: Knip

on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  actions: write

jobs:
  knip:
    name: Knip
    runs-on: ubuntu-latest

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}

      - name: Check out code
        uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Run knip (unused detection)
        run: bun run knip
