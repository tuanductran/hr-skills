name: Publish

on:
  push:
    tags:
      - 'skills-ref@*'

permissions:
  contents: read
  id-token: write  # required for npm provenance

jobs:
  publish:
    name: Publish skills-ref to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Build skills-ref
        run: bun run build --filter=skills-ref

      - name: Publish to npm
        run: npm publish --provenance
        working-directory: packages/skills-ref
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
