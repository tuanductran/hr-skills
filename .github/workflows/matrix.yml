name: Skill Matrix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  matrix:
    name: Generate Skill Matrix and Registry
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun ci

      - name: Generate skill matrix
        run: bun run matrix

      - name: Generate skill registry
        run: bun run registry

      - name: Commit updated skill matrix and registry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/skill-matrix.md registry/skills.json
          git diff --cached --quiet || git commit -m "chore(docs): regenerate skill-matrix.md and registry/skills.json [skip ci]"
          git push
