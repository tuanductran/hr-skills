$schema: ./node_modules/lefthook/schema.json

pre-commit:
  parallel: true

  jobs:
    - name: biome
      run: bunx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    - name: markdown
      glob: "*.md"
      run: bun run lint:md:fix
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: bunx commitlint --edit {1}

pre-push:
  parallel: true

  jobs:
    - name: typecheck
      run: bun run typecheck

    - name: knip
      run: bunx knip

post-merge:
  jobs:
    - name: install
      glob:
        - package.json
        - bun.lock
        - packages/*/package.json
      run: bun install
